<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Specs</title>
    <link rel="stylesheet" href="datails.css">
</head>
<body>
    <section class="specs">
        <table>
            <caption>Technical Specifications</caption>
            <tr>
                <th>Feature</th>
                <th>Details</th>
            </tr>
            <tr>
                <td>Engine Type</td>
                <td>1.5L Dual VVT-i</td>
            </tr>
            <tr>
                <td>Fuel System</td>
                <td>Gasoline / EFI</td>
            </tr>
        </table>
    </section>

    <form>
        <label for="qty">Reserve Units:</label>
        <input type="number" id="qty" name="quantity" min="1" max="5" value="1">
        <button type="submit">Add to Inquiry Cart</button>
    </form>

    <section class="reviews">
        <h2>Owner Reviews</h2>
        <article>
            <blockquote>"Matipid sa gas at napakaganda ng handling sa San Roque roads!"</blockquote>
            <cite>— Happy Driver</cite>
        </article>
    </section>
</body>
</html>
