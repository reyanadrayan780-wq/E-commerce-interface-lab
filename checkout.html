<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize Order | AutoDrive</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <h1>Checkout</h1>
    <div class="checkout-container">
        <main class="checkout-main">
            <section id="delivery">
                <fieldset>
                    <legend>Delivery Address</legend>
                    <input type="text" placeholder="Full Name" required>
                    <input type="text" placeholder="Barangay / Street" required>
                    <input type="text" placeholder="Province" value="Northern Samar">
                </fieldset>
            </section>

            <form class="payment-method">
                <h3>Financing Method</h3>
                <input type="radio" id="bank" name="payment" value="bank">
                <label for="bank">Bank Financing</label>
                <br>
                <input type="radio" id="cash" name="payment" value="cash">
                <label for="cash">Cash on Delivery</label>
            </form>
        </main>

        <aside class="order-summary">
            <h3>Order Summary</h3>
            <p>Downpayment: ₱50,000</p>
            <button type="button" class="confirm-btn">Confirm Purchase</button>
        </aside>
    </div>
</body>
</html>
