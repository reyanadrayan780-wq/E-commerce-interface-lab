<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finalize Order</title>
</head>
<body>
    <section id="delivery">
        <fieldset>
            <label>Delivery Address</label>
            <input type="text" placeholder="Full Name" required>
            <input type="text" placeholder="Barangay / Street" required>
            <input type="text" placeholder="Province" value="Northern Samar">
        </fieldset>
    </section>

    <form>
        <h3>Financing Method</h3>
        <input type="radio" id="bank" name="payment" value="bank">
        <label for="bank">Bank Financing</label>
        <input type="radio" id="cash" name="payment" value="cash">
        <label for="cash">Cash on Delivery</label>
    </form>

    <aside style="position: sticky; top: 10px; border: 1px solid #ccc;">
        <h3>Order Summary</h3>
        <p>Downpayment: ₱50,000</p>
        <button type="button">Confirm Purchase</button>
    </aside>
</body>
</html>
